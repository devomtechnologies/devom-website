<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Trip Entry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header"></div>

<section class="dashboard">
  <h2>Start New Trip Entry</h2>
  <form id="entryForm">
    <input type="date" id="tripDate" required><br><br>
    <input type="text" id="vehicleNo" placeholder="Vehicle No" required><br><br>
    <input type="text" id="driverName" placeholder="Driver Name" required><br><br>
    <input type="number" id="gaadiMT" placeholder="Gaadi Kitne MT" required><br><br>
    <button type="submit">Save Entry</button>
  </form>
</section>

<div id="footer"></div>

<script>
fetch('header.html').then(res=>res.text()).then(data=>{document.getElementById('header').innerHTML=data;});
fetch('footer.html').then(res=>res.text()).then(data=>{document.getElementById('footer').innerHTML=data;});

document.getElementById('entryForm').addEventListener('submit', function(e){
  e.preventDefault();
  const currentUser = localStorage.getItem('currentUser');
  if(!currentUser){ alert('Login first!'); location.href='tms-login.html'; return; }

  const entries = JSON.parse(localStorage.getItem('entries')) || [];
  const entry = {
    user: currentUser,
    date: document.getElementById('tripDate').value,
    vehicleNo: document.getElementById('vehicleNo').value,
    driverName: document.getElementById('driverName').value,
    gaadiMT: document.getElementById('gaadiMT').value
  };
  entries.push(entry);
  localStorage.setItem('entries', JSON.stringify(entries));
  alert('Entry saved!');
  document.getElementById('entryForm').reset();
});
</script>
