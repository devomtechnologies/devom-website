<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Devom TMS</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
section.dashboard {
  max-width: 400px;
  margin: 50px auto;
  background: #f8f8f8;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  text-align: center;
}
section.dashboard input {
  display: block;
  width: 90%;
  margin: 12px auto;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
section.dashboard button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
section.dashboard button:hover {
  opacity: 0.9;
}
</style>

</head>
<body>

<!-- Header -->
<div id="header"></div>

<section class="dashboard">
  <h2>Transporter Login</h2>
  <form id="loginForm">
    <input type="text" id="userId" placeholder="User ID" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p style="margin-top:15px;">Don't have an account? <a href="tms-register.html">Register Here</a></p>
</section>

<!-- Footer -->
<div id="footer"></div>

<script>
fetch('header.html')
  .then(res => res.text())
  .then(data => { document.getElementById('header').innerHTML = data; });

fetch('footer.html')
  .then(res => res.text())
  .then(data => { document.getElementById('footer').innerHTML = data; });
</script>

<script src="js/main.js"></script>

</body>
</html>
