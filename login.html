<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Devom Technologies</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f4f7fb;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 30px;
background:#0f172a;
}

.logo img{
height:120px;
}

nav a{
margin-left:20px;
color:white;
text-decoration:none;
}

/* LOGIN BOX */
.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.login-box{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:350px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
cursor:pointer;
}

/* FOOTER */
footer{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<div class="logo">
<img src="devom-technologies-logo.png">
</div>

<nav>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</nav>
</header>

<div class="container">

<div class="login-box">

<h2>User Login</h2>

<input type="text" id="userid" placeholder="User ID">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<footer>
<p>© 2026 Devom Technologies</p>
</footer>

<script>

function login(){

let user = document.getElementById("userid").value;
let pass = document.getElementById("password").value;

/* DEMO LOGIN */
if(user === "admin" && pass === "1234"){
window.location.href = "dashboard.html";
}
else{
alert("Invalid User ID or Password");
}

}

</script>
<script src="js/main.js"></script>
</body>
</html>
