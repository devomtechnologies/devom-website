<!DOCTYPE html>

<body>
<div id="header"></div>

<section class="dashboard">
  <h2>Complete Your Payment</h2>
  <p>Scan the QR code below to pay and activate your account.</p>
  <img src="qr.png" alt="QR Payment">
  <button onclick="paymentDone()">Payment Done</button>
</section>

<div id="footer"></div>

<script>
fetch('header.html').then(res => res.text()).then(data => { document.getElementById('header').innerHTML = data; });
fetch('footer.html').then(res => res.text()).then(data => { document.getElementById('footer').innerHTML = data; });

const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user');

function paymentDone(){
    const user = JSON.parse(localStorage.getItem(userId));
    if(user){
        user.paid = true;
        localStorage.setItem(userId, JSON.stringify(user));
        alert('Payment Completed! Now login with your User ID.');
        location.href = 'tms-login.html';
    } else {
        alert('User not found!');
    }
}
</script>
