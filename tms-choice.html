<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS Options</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<div id="header"></div>

<section class="tms-section" style="padding:80px 20px;text-align:center;">
  <h2>Transport Management System</h2>
  <p>Please choose an option:</p>
  <div class="tms-buttons">
    <a href="tms-register.html" class="btn btn-register">Register Now</a>
    <a href="tms-login.html" class="btn btn-login">Login</a>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<script>
fetch('header.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('header').innerHTML=data);
fetch('footer.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('footer').innerHTML=data);
</script>

</body>
</html>
