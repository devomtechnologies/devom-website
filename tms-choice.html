<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS Options</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f5f7fb;}
.tms-section{padding:80px 20px;text-align:center;}
.tms-section h2{font-size:32px;margin-bottom:10px;color:#0d2a4d;}
.tms-section p{font-size:18px;color:#1a3d66;margin-bottom:30px;}
.tms-buttons .btn{
  display:inline-block;
  padding:14px 35px;
  margin:10px;
  font-size:16px;
  font-weight:bold;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}
.btn-register{background:#007bff;}
.btn-register:hover{background:#0056b3;}
.btn-login{background:#28a745;}
.btn-login:hover{background:#1e7e34;}
</style>
</head>
<body>

<!-- Header -->
<div id="header"></div>

<section class="tms-section">
  <h2>Transport Management System</h2>
  <p>Please choose an option:</p>
  <div class="tms-buttons">
    <a href="tms-register.html" class="btn btn-register">Register Now</a>
    <a href="tms-login.html" class="btn btn-login">Login</a>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<!-- JS for header/footer -->
<script>
fetch('header.html').then(res=>res.text()).then(data=>document.getElementById('header').innerHTML=data);
fetch('footer.html').then(res=>res.text()).then(data=>document.getElementById('footer').innerHTML=data);
</script>

</body>
</html>
