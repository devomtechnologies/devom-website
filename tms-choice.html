<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Payment - Devom TMS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="dashboard">
  <h2>Complete Your Payment</h2>
  <p style="text-align:center;">Scan the QR code below to pay.</p>
  <div style="text-align:center; margin-top:20px;">
    <img src="qr.png" alt="QR Payment" style="width:250px;">
  </div>
  <div style="text-align:center; margin-top:20px;">
    <button onclick="paymentDone()">Payment Done</button>
  </div>
</section>

<div id="footer"></div>

<script>
fetch('header.html')
  .then(res => res.text())
  .then(data => { document.getElementById('header').innerHTML = data; });

fetch('footer.html')
  .then(res => res.text())
  .then(data => { document.getElementById('footer').innerHTML = data; });

// Payment simulation
function paymentDone(){
  alert('Payment Completed! Now login with your User ID.');
  location.href = 'tms-login.html';
}
</script>
<script src="js/main.js"></script>

</body>
</html>
