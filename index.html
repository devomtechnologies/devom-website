<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devom Technologies</title>

<style>
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#f4f7fb;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:linear-gradient(90deg,#0a1f44,#163b7a);
color:white;
position:sticky;
top:0;
}

.logo{
display:flex;
align-items:center;
}

.logo img{
height:50px;
margin-right:10px;
}

.logo h2{
margin:0;
font-size:22px;
font-weight:600;
letter-spacing:1px;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:15px;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#00c3ff;
}

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:40px;
color:#0a1f44;
}

.hero p{
font-size:18px;
color:#444;
max-width:700px;
margin:auto;
}

@media(max-width:768px){
header{
flex-direction:column;
text-align:center;
}

nav{
margin-top:10px;
}

nav a{
display:inline-block;
margin:10px;
}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="devom-technologies-logo-transparent.png" alt="Devom Logo">
<h2>Devom Technologies</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Smart Digital Solutions</h1>
<p>We build modern, scalable and professional software solutions for transport, textile and enterprise management systems.</p>
</section>

</body>
</html>
