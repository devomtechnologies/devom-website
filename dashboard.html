<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="checkLogin(); loadDashboard();">

<div id="header"></div>

<section style="padding:20px; text-align:center;">

  <h2 id="welcomeUser">Welcome</h2>

  <button onclick="logout()" style="margin:10px; padding:10px 20px;">
    Logout
  </button>

  <!-- 🔥 NEW DISPATCH ENTRY -->
  <div class="card" style="margin-top:20px; padding:20px;">

    <h3>New Dispatch Entry</h3>

    <input type="text" id="party1" placeholder="1st Party (Client)">
    <input type="text" id="party2" placeholder="2nd Party (Transporter)">

    <input type="text" id="from" placeholder="From Location">
    <input type="text" id="to" placeholder="To Location">

    <input type="text" id="vehicleNo" placeholder="Vehicle Number">
    <input type="text" id="driverName" placeholder="Driver Name">
    <input type="text" id="driverMobile" placeholder="Driver Mobile">

    <input type="text" id="vehicleType" placeholder="Vehicle Type (Open/Container)">
    <input type="number" id="wheels" placeholder="Number of Wheels">

    <input type="number" id="purchaseAmount" placeholder="Purchase Amount (Liya)">
    <input type="number" id="saleAmount" placeholder="Sale Amount (Diya)">

    <input type="text" id="lrNumber" placeholder="LR Number">

    <br><br>

    <button onclick="saveDispatch()" style="padding:10px 20px;">
      Save Dispatch
    </button>

  </div>

  <!-- EXISTING SECTIONS -->
  <div class="card">
    <h3>Manage Trips</h3>
    <p>Coming Soon</p>
  </div>

  <div class="card">
    <h3>Ledger</h3>
    <p>Coming Soon</p>
  </div>

</section>

<div id="footer"></div>

<script>
fetch('header.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('header').innerHTML=data);

fetch('footer.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('footer').innerHTML=data);
</script>

<script src="js/main.js"></script>

</body>
</html>
