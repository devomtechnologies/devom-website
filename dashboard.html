<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="checkLogin(); loadDashboard(); loadDispatchList();">

<div id="header"></div>

<section style="padding:20px; text-align:center;">

  <h2 id="welcomeUser">Welcome</h2>

  <button onclick="logout()" style="margin:10px; padding:10px 20px;">
    Logout
  </button>

  <!-- DISPATCH FORM -->
  <h3>New Dispatch</h3>

  <input id="party1" placeholder="From Party (Vehicle Owner)">
  <input id="party2" placeholder="To Party (Client / Transporter)">
  <input id="from" placeholder="From City">
  <input id="to" placeholder="To City">
  <input id="vehicleNo" placeholder="Vehicle Number">
  <input id="driverName" placeholder="Driver Name">
  <input id="driverMobile" placeholder="Driver Mobile">
  
  <input id="vehicleType" placeholder="Vehicle Type (Open / Container)">
  <input id="wheels" placeholder="No. of Wheels">

  <input id="purchaseAmount" placeholder="Purchase Amount">
  <input id="saleAmount" placeholder="Sale Amount">
  <input id="lrNumber" placeholder="LR Number">

  <br><br>
  <button onclick="saveDispatch()">Save Dispatch</button>

  <!-- DISPATCH TABLE -->
  <h3 style="margin-top:30px;">Dispatch Records</h3>

  <table id="dispatchTable" border="1" width="100%" style="margin-top:10px;">
    <thead>
      <tr>
        <th>Vehicle</th>
        <th>Route</th>
        <th>From Party</th>
        <th>To Party</th>
        <th>Purchase</th>
        <th>Sale</th>
        <th>Profit</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</section>

<div id="footer"></div>

<!-- HEADER FOOTER LOAD -->
<script>
fetch('header.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('header').innerHTML=data);

fetch('footer.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('footer').innerHTML=data);
</script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY",
  authDomain: "PASTE_YOUR_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- MAIN JS -->
<script src="js/main.js"></script>

</body>
</html>
