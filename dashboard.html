<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="checkLogin(); loadDashboard(); loadDispatchList();">

<div id="header"></div>

<section style="padding:20px; text-align:center;">

  <h2 id="welcomeUser">Welcome</h2>

  <button onclick="logout()" style="margin:10px; padding:10px 20px;">
    Logout
  </button>

  <!-- NEW DISPATCH -->
  <div class="card" style="padding:20px; margin-top:20px;">
    <h3>New Dispatch Entry</h3>

    <input type="text" id="party1" placeholder="1st Party">
    <input type="text" id="party2" placeholder="2nd Party">

    <input type="text" id="from" placeholder="From">
    <input type="text" id="to" placeholder="To">

    <input type="text" id="vehicleNo" placeholder="Vehicle No">
    <input type="text" id="driverName" placeholder="Driver Name">
    <input type="text" id="driverMobile" placeholder="Driver Mobile">

    <input type="text" id="vehicleType" placeholder="Vehicle Type">
    <input type="number" id="wheels" placeholder="Wheels">

    <input type="number" id="purchaseAmount" placeholder="Purchase Amount">
    <input type="number" id="saleAmount" placeholder="Sale Amount">

    <input type="text" id="lrNumber" placeholder="LR Number">

    <br><br>
    <button onclick="saveDispatch()">Save Dispatch</button>
  </div>

  <!-- DISPATCH LIST -->
  <h3 style="margin-top:30px;">Dispatch List</h3>

  <table border="1" width="100%" id="dispatchTable">
    <thead>
      <tr>
        <th>Vehicle</th>
        <th>Route</th>
        <th>Party1</th>
        <th>Party2</th>
        <th>Purchase</th>
        <th>Sale</th>
        <th>Profit</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</section>

<div id="footer"></div>

<script>
fetch('header.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('header').innerHTML=data);

fetch('footer.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('footer').innerHTML=data);
</script>

<script src="js/main.js"></script>

</body>
</html>
