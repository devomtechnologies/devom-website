<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Devom TMS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="products">
  <h2>Dashboard</h2>
  <p>Welcome! Choose an action below:</p>
  <div class="product-grid">
    <div class="card" onclick="location.href='entry.html'">
      <h3>Start New Trip Entry</h3>
      <p>Add a new trip with vehicle, driver, and MT details.</p>
    </div>
    <div class="card" onclick="location.href='ledger.html'">
      <h3>Ledger</h3>
      <p>View all trips and balances.</p>
    </div>
  </div>
</section>

<div id="footer"></div>

<script>
fetch('header.html').then(res=>res.text()).then(data=>{document.getElementById('header').innerHTML=data;});
fetch('footer.html').then(res=>res.text()).then(data=>{document.getElementById('footer').innerHTML=data;});
</script>
<script src="js/main.js"></script>
</body>
</html>
