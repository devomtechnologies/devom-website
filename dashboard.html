<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Devom Technologies</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- Header -->
<div id="header"></div>

<!-- Dashboard Section -->
<section class="dashboard">
  <h2>Welcome to Your Dashboard</h2>
  <div class="dashboard-grid">
    <div class="dashboard-card" data-link="tms-register.html">
      <h3>Register Transporter</h3>
      <p>Add new transporter accounts to TMS.</p>
    </div>
    <div class="dashboard-card" data-link="tms-login.html">
      <h3>Transporter Login</h3>
      <p>Check transporter trips and payments.</p>
    </div>
    <div class="dashboard-card" data-link="ledger.html">
      <h3>Ledger</h3>
      <p>View Client & Transporter Ledger</p>
    </div>
    <div class="dashboard-card" onclick="alert('Reports Coming Soon')">
      <h3>Reports</h3>
      <p>View Smart Reports & Analytics.</p>
    </div>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<!-- JS to load header/footer -->
<script>
fetch('header.html')
  .then(res => res.text())
  .then(data => { document.getElementById('header').innerHTML = data; });

fetch('footer.html')
  .then(res => res.text())
  .then(data => { document.getElementById('footer').innerHTML = data; });
</script>

<!-- Main JS -->
<script src="js/main.js"></script>

</body>
</html>
