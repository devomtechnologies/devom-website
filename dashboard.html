<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>
#printArea {
    display:none;
}
@media print {
    body * {
        visibility: hidden;
    }
    #printArea, #printArea * {
        visibility: visible;
    }
    #printArea {
        position:absolute;
        left:0;
        top:0;
        width:100%;
    }
}
</style>

</head>

<body onload="checkLogin(); loadDashboard(); loadDispatchList(); loadAuditLog(); loadLedger();">

<h2 id="welcomeUser"></h2>
<button onclick="logout()">Logout</button>

<!-- DISPATCH -->
<div class="card">
<h3>New Dispatch</h3>

<input id="party1" placeholder="1st Party">
<input id="party2" placeholder="2nd Party">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="vehicleNo" placeholder="Vehicle No">
<input id="driverName" placeholder="Driver Name">
<input id="driverMobile" placeholder="Driver Mobile">
<input id="vehicleType" placeholder="Vehicle Type">
<input id="wheels" placeholder="Wheels">
<input id="purchaseAmount" placeholder="Purchase Amount">
<input id="saleAmount" placeholder="Sale Amount">
<input id="lrNumber" placeholder="LR Number">

<br><br>
<button onclick="saveDispatch()">Save</button>
</div>

<!-- LEDGER + INVOICE -->
<h3>Generate Invoice</h3>

<select id="partyFilter" onchange="loadLedger()">
<option value="">Select Party</option>
</select>

<button onclick="generateInvoice()">Generate Invoice</button>
<button onclick="printInvoice()">Print / PDF</button>

<!-- PRINT AREA -->
<div id="printArea"></div>

<!-- DISPATCH LIST -->
<h3>Dispatch List</h3>
<table border="1" width="100%" id="dispatchTable">
<thead>
<tr>
<th>Vehicle</th>
<th>Route</th>
<th>Party1</th>
<th>Party2</th>
<th>Purchase</th>
<th>Sale</th>
<th>Profit</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- AUDIT -->
<h3>Audit Log</h3>
<table border="1" width="100%" id="auditTable">
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Field</th>
<th>Old</th>
<th>New</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="js/main.js"></script>

</body>
</html>
