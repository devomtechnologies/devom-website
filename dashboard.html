<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Devom TMS</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header"></div>

<section class="dashboard-section">
    <h2>Transporter Dashboard</h2>
    <div id="welcomeMsg"></div>
    <div class="dashboard-cards">
        <div class="card">
            <h3>Ledger</h3>
            <p>Check your payments and deductions</p>
        </div>
        <div class="card">
            <h3>Trips</h3>
            <p>View all upcoming and completed trips</p>
        </div>
        <div class="card">
            <h3>QR Payment</h3>
            <p>Verify payment automatically</p>
            <button class="btn primary-btn" onclick="verifyQRPayment('12345')">Verify Payment</button>
        </div>
    </div>
</section>

<div id="footer"></div>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
    const currentUserId = localStorage.getItem('currentUser');
    if(!currentUserId){
        alert('Please login first');
        window.location.href = "login.html";
        return;
    }
    const userData = JSON.parse(localStorage.getItem(currentUserId));
    document.getElementById('welcomeMsg').innerHTML = `<h3>Welcome, ${userData.ownerName} (${userData.transportName})</h3>`;
});
</script>
</body>
</html>
