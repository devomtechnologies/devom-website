<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header"></div>

<section class="dashboard">
  <h2>Transporter Login</h2>
  <form id="loginForm">
    <input type="text" id="loginUserId" placeholder="User ID" required><br><br>
    <input type="password" id="loginPassword" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
  </form>
</section>

<div id="footer"></div>

<script>
fetch('header.html').then(res => res.text()).then(data => { document.getElementById('header').innerHTML = data; });
fetch('footer.html').then(res => res.text()).then(data => { document.getElementById('footer').innerHTML = data; });

document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const id = document.getElementById('loginUserId').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();
    const user = JSON.parse(localStorage.getItem(id));
    if(!user){ alert('User ID not found!'); return; }
    if(!user.paid){ alert('Payment pending!'); return; }
    if(user.password === pass){
        localStorage.setItem('currentUser', id);
        alert('Login Successful!');
        location.href = 'dashboard.html';
    } else { alert('Incorrect Password!'); }
});
</script>
<script src="js/main.js"></script>
</body>
</html>
