<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header"></div>

<section class="dashboard">
  <h2>Register New Transporter</h2>
  <form id="registerForm">
    <input type="text" id="ownerName" placeholder="Owner Name" required><br><br>
    <input type="text" id="firmName" placeholder="Firm Name" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="text" id="mobile" placeholder="Mobile" required><br><br>
    <input type="text" id="city" placeholder="City" required><br><br>
    <input type="text" id="state" placeholder="State" required><br><br>
    <input type="text" id="userId" placeholder="User ID" required><br><br>
    <input type="password" id="password" placeholder="Password" required><br><br>
    <button type="submit">Register</button>
  </form>
</section>

<div id="footer"></div>

<script>
fetch('header.html').then(res => res.text()).then(data => { document.getElementById('header').innerHTML = data; });
fetch('footer.html').then(res => res.text()).then(data => { document.getElementById('footer').innerHTML = data; });

// Register Form JS
document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();
  const user = {
    ownerName: document.getElementById('ownerName').value,
    firmName: document.getElementById('firmName').value,
    email: document.getElementById('email').value,
    mobile: document.getElementById('mobile').value,
    city: document.getElementById('city').value,
    state: document.getElementById('state').value,
    userId: document.getElementById('userId').value,
    password: document.getElementById('password').value
  };
  localStorage.setItem(user.userId, JSON.stringify(user));
  alert('Registration Successful! Please complete QR Payment.');
  location.href = 'tms-payment.html';
});
</script>
<script src="js/main.js"></script>
</body>
</html>
