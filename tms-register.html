<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<section class="form-section">
  <h2>Register for TMS</h2>

  <form onsubmit="return false;">

    <input type="text" id="owner" placeholder="Owner Name" required>
    <input type="text" id="transport" placeholder="Transport Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>
    <input type="text" id="city" placeholder="City" required>
    <input type="text" id="state" placeholder="State" required>

    <!-- IMPORTANT -->
    <input type="text" id="userid" placeholder="Create User ID" required>
    <input type="password" id="password" placeholder="Create Password" required>

    <button type="button" onclick="registerUser()">Register</button>

  </form>

  <!-- PAYMENT SECTION -->
  <div style="text-align:center; margin-top:20px;">
    <h3>Pay Registration Fee</h3>

    <img src="qr.png" width="200" />

    <p>After payment, click verify button</p>

    <input type="text" id="userid" placeholder="Enter User ID again">

    <button onclick="verifyPayment()">Verify Payment</button>
  </div>

</section>

<div id="footer"></div>

<script>
fetch('header.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('header').innerHTML=data);

fetch('footer.html')
  .then(res=>res.text())
  .then(data=>document.getElementById('footer').innerHTML=data);
</script>

<script src="js/main.js"></script>

</body>
</html>
