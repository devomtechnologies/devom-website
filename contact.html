<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Devom Technologies</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f4f7fb;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 30px;
background:#0f172a;
}

.logo img{
height:120px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:500;
}

/* CONTACT SECTION */
.contact-container{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
gap:40px;
flex-wrap:wrap;
}

/* LEFT INFO */
.contact-info{
max-width:350px;
}

.contact-info h2{
font-size:28px;
margin-bottom:10px;
}

.contact-info p{
color:#555;
margin-bottom:10px;
}

/* FORM BOX */
.form-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:350px;
}

/* INPUT GROUP */
.input-group{
text-align:left;
margin-bottom:15px;
}

.input-group label{
font-size:14px;
font-weight:500;
display:block;
margin-bottom:5px;
}

.input-group input,
.input-group textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* FOOTER */
footer{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

/* MOBILE */
@media(max-width:768px){
.contact-container{
flex-direction:column;
}
}

</style>

</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">
<img src="devom-technologies-logo.png">
</div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<!-- CONTACT SECTION -->
<div class="contact-container">

<!-- LEFT SIDE -->
<div class="contact-info">
<h2>Get in Touch</h2>
<p>Have any questions about our software solutions?</p>
<p>Fill out the form and our team will get back to you shortly.</p>

<p><strong>Email:</strong> devomtechnologies@gmail.com</p>
<p><strong>Phone:</strong> +91 9691150577</p>
</div>

<!-- FORM -->
<div class="form-box">

<form action="https://formsubmit.co/devomtechnologies@gmail.com" method="POST">

<div class="input-group">
<label>Your Name</label>
<input type="text" name="name" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Subject</label>
<input type="text" name="subject" required>
</div>

<div class="input-group">
<label>Your Query</label>
<textarea name="message" rows="4" required></textarea>
</div>

<input type="hidden" name="_next" value="thankyou.html">
<input type="hidden" name="_captcha" value="false">
<input type="text" name="_honey" style="display:none">

<button type="submit">Send Message</button>

</form>

</div>

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 Devom Technologies</p>
</footer>

</body>
</html>
