<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger - Devom TMS</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- Header -->
<div id="header"></div>

<section class="dashboard">
  <h2>Ledger Management</h2>

  <!-- Add Transaction Form -->
  <form id="ledgerForm">
    <input type="text" id="ledgerUserId" placeholder="User ID" required>
    <input type="number" id="ledgerAmount" placeholder="Amount (+ for Add, - for Deduct)" required>
    <input type="text" id="ledgerReason" placeholder="Reason" required>
    <button type="submit">Add Entry</button>
  </form>

  <div style="text-align:center; margin-top:15px;">
    <button id="exportPDF">Export Ledger as PDF</button>
  </div>

  <!-- Ledger Table -->
  <h3 style="margin-top:30px; text-align:center;">All Transactions</h3>
  <table id="ledgerTable" border="1" cellpadding="8" cellspacing="0" style="margin:auto; width:90%; max-width:900px; text-align:center; border-collapse: collapse;">
    <thead>
      <tr style="background:#2563eb; color:white;">
        <th>User ID</th>
        <th>Amount</th>
        <th>Reason</th>
        <th>Balance</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<div id="footer"></div>

<script>
fetch('header.html').then(res=>res.text()).then(data=>{document.getElementById('header').innerHTML=data;});
fetch('footer.html').then(res=>res.text()).then(data=>{document.getElementById('footer').innerHTML=data;});

// Ledger Functionality
let ledger = JSON.parse(localStorage.getItem('ledger')) || [];

function renderLedger(){
  const tbody = document.querySelector('#ledgerTable tbody');
  tbody.innerHTML = '';
  let balanceMap = {};
  ledger.forEach(entry=>{
    if(!balanceMap[entry.userId]) balanceMap[entry.userId] = 0;
    balanceMap[entry.userId] += parseFloat(entry.amount);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${entry.userId}</td>
                    <td>${entry.amount}</td>
                    <td>${entry.reason}</td>
                    <td>${balanceMap[entry.userId]}</td>
                    <td>${entry.date}</td>`;
    tbody.appendChild(tr);
  });
}

renderLedger();

// Add Ledger Entry
document.getElementById('ledgerForm').addEventListener('submit', function(e){
  e.preventDefault();
  const userId = document.getElementById('ledgerUserId').value.trim();
  const amount = parseFloat(document.getElementById('ledgerAmount').value);
  const reason = document.getElementById('ledgerReason').value.trim();
  const date = new Date().toLocaleString();

  ledger.push({userId, amount, reason, date});
  localStorage.setItem('ledger', JSON.stringify(ledger));
  renderLedger();
  this.reset();
});

// Export PDF
document.getElementById('exportPDF').addEventListener('click', function(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text("Ledger Report - Devom TMS", 10, 10);
  const headers = [["User ID","Amount","Reason","Balance","Date"]];
  let balanceMap = {};
  const data = ledger.map(entry=>{
    if(!balanceMap[entry.userId]) balanceMap[entry.userId] = 0;
    balanceMap[entry.userId] += parseFloat(entry.amount);
    return [entry.userId, entry.amount, entry.reason, balanceMap[entry.userId], entry.date];
  });
  doc.autoTable({
    head: headers,
    body: data,
    startY: 20,
    theme: 'grid'
  });
  doc.save('Ledger_Report.pdf');
});
</script>

<script src="js/main.js"></script>
</body>
</html>
