<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header"></div>

<section class="dashboard">
  <h2>Ledger</h2>
  <table border="1" cellpadding="8">
    <thead>
      <tr>
        <th>Date</th>
        <th>Vehicle No</th>
        <th>Driver</th>
        <th>Gaadi MT</th>
        <th>Transporter</th>
      </tr>
    </thead>
    <tbody id="ledgerBody"></tbody>
  </table>
</section>

<div id="footer"></div>

<script>
fetch('header.html').then(res=>res.text()).then(data=>{document.getElementById('header').innerHTML=data;});
fetch('footer.html').then(res=>res.text()).then(data=>{document.getElementById('footer').innerHTML=data;});

const entries = JSON.parse(localStorage.getItem('entries')) || [];
const tbody = document.getElementById('ledgerBody');
entries.forEach(e=>{
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${e.date}</td><td>${e.vehicleNo}</td><td>${e.driverName}</td><td>${e.gaadiMT}</td><td>${e.user}</td>`;
  tbody.appendChild(tr);
});
</script>
